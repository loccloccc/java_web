<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<style>
    .error{
        color: red;
    }
</style>

<form th:action="@{/handle-add}" method="post" th:object="${playerDTO}" enctype="multipart/form-data">
    <div class="form-group">
        <label for="">ID</label>
        <input type="text" th:field="*{id}">
        <p th:if="${#fields.hasErrors('id')}" th:errors="*{id}" class="error"></p>
    </div>
    <div class="form-group">
        <label for="">TEN</label>
        <input type="text" th:field="*{name}">
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"> </p>
    </div>
    <div class="form-group">
        <label for="">Vi Tri</label>
        <input type="text" th:field="*{positio}">
        <p th:if="${#fields.hasErrors('positio')}" th:errors="*{positio}" class="error"></p>
    </div>
    <div class="form-group">
        <label for="">So Ao</label>
        <input type="number" th:field="*{jerseyNumber}">
        <p th:if="${#fields.hasErrors('jerseyNumber')}" th:errors="*{jerseyNumber}" class="error"></p>
    </div>
    <div class="form-group">
        <label for="">Anh</label>
        <input type="file" th:field="*{avatar}">
        <p th:if="${#fields.hasErrors('avatar')}" th:errors="*{avatar}" class="error"></p>
    </div>
    <div class="form-group">
        <label for="">Ngay sinh</label>
        <input type="date" th:field="*{birthDay}">
        <p th:if="${#fields.hasErrors('birthDay')}" th:errors="*{birthDay}" class="error"></p>
    </div>
    <button type="submit">Them</button>
</form>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
