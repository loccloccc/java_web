<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<style>
    .error{
        color: red;
    }
</style>

<form th:action="@{/handleAdd}" method="post" th:object="${todoDTO}">
    <div class="form-group">
        <label for="">content</label>
        <input type="text" th:field="*{content}">
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
    </div>
    <div class="form-group">
        <label for="">dueDate</label>
        <input type="date" th:field="*{dueDate}">
        <p class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></p>
    </div>
    <div>
        <label>status</label>
        <select th:field="*{status}">
            <option value="true">Da hoan thanh</option>
            <option value="false">Chua hoan thanh</option>
        </select>
    </div>
    <div class="form-group">
        <label for="">priority</label>
        <input type="text" th:field="*{priority}">
        <p class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>
    </div>

    <button type="submit">Submit</button>
</form>
</body>
</html>
