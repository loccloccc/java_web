<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>


<nav class="navbar navbar-expand-sm navbar-light bg-light">

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <p class="nav-link" th:text="|#{hello} ${session.name}|"></p>
            </li>

            <!-- Language dropdown -->
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" data-toggle="dropdown">
                    <span th:text="#{language}">Language</span>
                </a>

                <div class="dropdown-menu">
                    <a class="dropdown-item" th:href="@{/todo(lang='vi')}">Tiếng Việt</a>
                    <a class="dropdown-item" th:href="@{/todo(lang='en')}">English</a>
                </div>
            </li>

        </ul>
    </div>
</nav>

<a th:href="@{/add}">ADD TODO</a>

<table class="table">
    <thead>
    <tr>
        <th>STT</th>
        <th>content</th>
        <th>dueDue</th>
        <th>status</th>
        <th>priority</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t , Tcount : ${todos}">
        <td th:text="${Tcount.count}"></td>
        <td th:text="${t.content}"></td>
        <td th:text="${#temporals.format(t.dueDate,'dd/MM/yyyy')}"></td>
        <td th:text="${t.status} ? 'Da hoan thanh' : 'Chua hoan thanh'"></td>
        <td th:text="${t.priority}"></td>
        <td>
            <a th:href="@{|/update/${t.id}|}">Sua</a>
            <a th:href="@{|/delete/${t.id}|}" onclick="return confirm('Ban chac chan muon xoa')">Xoa</a>
        </td>
    </tr>
    </tbody>
</table>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
