<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div th:replace="/layout/layout::headerDetail"></div>
<div th:object="${detail}">
    <div style="display: flex ; flex-direction: row">ID : <div th:text="*{id}"></div></div>
    <div style="display: flex ; flex-direction: row">NAME : <div th:text="*{name}"></div></div>
    <div style="display: flex ; flex-direction: row">AUTHOR : <div th:text="*{author}"></div></div>
    <div style="display: flex ; flex-direction: row">PRICE :  <div th:text="*{price}"></div></div>
</div>
<div th:replace="/layout/layout::footer"></div>
</body>
</html>
