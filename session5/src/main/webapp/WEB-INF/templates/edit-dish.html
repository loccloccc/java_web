<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <form th:object="${update}">
        <label>ID</label>
        <input th:field="*{id}"><br>
        <label>NAME</label>
        <input th:field="*{name}"><br>
        <label>PRICE</label>
        <input th:field="*{price}"><br>
        <label>STATUS</label>
        <input th:value="*{isAvailable} ? 'Con hang' : 'Het hang'" readonly><br>
    </form>
</body>
</html>
