<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<form th:action="@{/}" method="get">
    <input type="text" name="search" id="">
    <button type="submit">Submit</button>
</form>

<a href="http://">Them</a>

<table class="table">
    <thead>
    <tr>
        <th>id</th>
        <th>title</th>
        <th>artist</th>
        <th>price</th>
        <th>releaseDate</th>
        <th>image</th>
        <th>category</th>
        <th>status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${artworks.content}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.title}"></td>
        <td th:text="${a.artist}"></td>
        <td th:text="${a.price}"></td>
        <td th:text="${x}"></td>
        <td>
            <img th:src="@{${a.image}}" alt="">
        </td>
        <td th:text="${a.category.name}"></td>
        <td th:text="${a.status ? 'Con hang' : 'Het hang'}"></td>
        <td></td>
    </tr>
    </tbody>
</table>

<nav aria-label="Page navigation">
    <ul class="pagination">
        <li class="page-item " th:classappend="${artworks.isFirst() ? 'disabled' : ''} ">
            <a class="page-link" th:href="@{/(page=${artworks.number - 1}, search=${search},size=${artworks.size})}" aria-label="Previous">
                &laquo;
            </a>
        </li>


        <li class="page-item" th:each="i : ${#numbers.sequence(0,artworks.totalPages - 1)}"
            th:classappend="${i == artworks.number} ? 'active'">

            <a class="page-link" th:text="${i+1}"
               th:href="@{/(page=${i}, search=${search},size=${artworks.size})}">

            </a></li>

        <li class="page-item " th:classappend="${artworks.isLast() ? 'disabled' : ''} ">
            <a class="page-link" th:href="@{/(page=${artworks.number + 1}, search=${search},size=${artworks.size} )}" aria-label="Previous">
                &raquo;
            </a>
        </li>
    </ul>
</nav>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
