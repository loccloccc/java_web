<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<body>
<section layout:fragment="content">
    <h2>Danh sách khóa học</h2>

    <form method="get" th:action="@{/course/list}" class="form-row">
        <select name="level" class="field">
            <option value="ALL" th:selected="${level == 'ALL'}">All</option>
            <option value="Beginner" th:selected="${level == 'Beginner'}">Beginner</option>
            <option value="Intermediate" th:selected="${level == 'Intermediate'}">Intermediate</option>
            <option value="Advanced" th:selected="${level == 'Advanced'}">Advanced</option>
        </select>

        <input type="number" name="price" class="field" placeholder="Học phí tối đa" th:value="${price}" />
        <button type="submit" class="btn btn-primary">Lọc</button>
    </form>

    <p th:if="${success}" th:text="${success}" class="alert success"></p>
    <p th:if="${error}" th:text="${error}" class="alert error"></p>
    <p th:if="${emptyMessage}" th:text="${emptyMessage}" class="alert"></p>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Mã</th>
                <th>Tên khóa</th>
                <th>Level</th>
                <th>Học phí</th>
                <th>Chi tiết</th>
                <th>Sửa</th>
                <th>Hủy</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.code}"></td>
                <td th:text="${c.name}"></td>
                <td th:text="${c.level}"></td>
                <td th:text="${#numbers.formatDecimal(c.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
                <td><a class="btn btn-ghost" th:href="@{/course/detail/{code}(code=${c.code})}">Xem</a></td>
                <td><a class="btn btn-ghost" th:href="@{/course/edit/{code}(code=${c.code})}">Sửa</a></td>
                <td>
                    <form th:action="@{/course/delete/{code}(code=${c.code})}" method="post">
                        <button type="submit" class="btn btn-danger">Hủy khóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
