<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<body>
<section layout:fragment="content">
    <h2>Chỉnh sửa khóa học</h2>
    <form th:action="@{/course/update}" method="post" th:object="${course}">
        <input type="hidden" th:field="*{code}" />

        <div class="form-row" style="margin-bottom:10px;">
            <label style="min-width:140px;">Học phí</label>
            <input type="number" th:field="*{price}" class="field" />
        </div>

        <div class="form-row" style="margin-bottom:12px;">
            <label style="min-width:140px;">Ngày khai giảng</label>
            <input type="date" th:field="*{startDate}" class="field" />
        </div>

        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
        <a th:href="@{/course/list}" class="btn btn-ghost">Hủy</a>
    </form>
</section>
</body>
</html>
