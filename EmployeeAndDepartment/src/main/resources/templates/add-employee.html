<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<style>
    .error{
        color: red;
    }
</style>
<form th:action="@{/handleAdd}" method="post" enctype="multipart/form-data" th:object="${employeeDTO}">
    <div class="form-group">
        <label for="">Ten</label>
        <input type="text" th:field="*{name}">
        <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
    </div>
    <div class="form-group">
        <label for="">Tuoi</label>
        <input type="text" th:field="*{age}">
        <p class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></p>
    </div>
    <div class="form-group">
        <label for="">Avatar</label>
        <input type="file" th:field="*{avatar}">
        <p class="error" th:if="${#fields.hasErrors('avatar')}" th:errors="*{avatar}"></p>
    </div>

    <div class="form-group">
        <label for="">Trang thai</label>
        <select th:field="*{status}">
            <option th:value="true">Hoạt động</option>
            <option th:value="false">Ngừng</option>
        </select>
    </div>
    <div class="form-group">
        <label for="">Phong ban</label>
        <select th:field="*{departmentId}">
            <option  th:each="d : ${department}" th:value="${d.id}" th:text="${d.name}" ></option>
        </select>
        <p class="error" th:if="${#fields.hasErrors('departmentId')}" th:errors="*{departmentId}"></p>
    </div>
    <button type="submit">Submit</button>
</form>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
