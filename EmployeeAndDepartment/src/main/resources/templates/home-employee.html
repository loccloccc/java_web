<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-3">Employee Management</h2>

    <!-- 🔔 THÔNG BÁO -->
    <div th:if="${message}" class="alert alert-success">
        <span th:text="${message}"></span>
    </div>

    <!-- 🔍 SEARCH MULTI -->
    <form th:action="@{/employees}" method="get" class="mb-3">

        <div class="form-row">

            <div class="col">
                <input type="text" name="name"
                       placeholder="Tên nhân viên"
                       th:value="${name}"
                       class="form-control"/>
            </div>

            <div class="col">
                <select name="departmentId" class="form-control">
                    <option value="">-- Phòng ban --</option>
                    <option th:each="d : ${departments}"
                            th:value="${d.id}"
                            th:text="${d.name}"
                            th:selected="${d.id == departmentId}">
                    </option>
                </select>
            </div>

            <div class="col">
                <input type="number" name="minAge"
                       placeholder="Tuổi từ"
                       th:value="${minAge}"
                       class="form-control"/>
            </div>

            <div class="col">
                <input type="number" name="maxAge"
                       placeholder="Tuổi đến"
                       th:value="${maxAge}"
                       class="form-control"/>
            </div>

            <div class="col">
                <button type="submit" class="btn btn-primary">
                    Search
                </button>
            </div>

        </div>
    </form>

    <!-- ➕ ADD -->
    <a th:href="@{/add}" class="btn btn-success mb-3">Add Employee</a>

    <!-- 📊 TABLE -->
    <table class="table table-bordered table-hover">
        <thead>
        <tr>
            <th class="text-center">ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Avatar</th>
            <th>Status</th>
            <th>Department</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="6" class="text-center text-danger">
                Không tìm thấy nhân viên nào
            </td>
        </tr>

        <tr th:each="emp : ${employees}">
            <td class="text-center" th:text="${emp.id}"></td>

            <td th:text="${emp.name}"></td>

            <td th:text="${emp.age}"></td>

            <td>
                <img th:src="@{${emp.avatar}}"
                     style="width:50px;height:50px;border-radius:50%">
            </td>

            <td th:text="${emp.status} ? 'Hoạt động' : 'Ngừng'"></td>

            <td>
                <span th:text="${emp.department != null ? emp.department.name : 'Chưa phân bổ'}"></span>

                <br/>

                <!-- 🔥 NÚT XÓA PHÒNG BAN -->
                <a th:if="${emp.department != null}"
                   th:href="@{/departments/delete/{id}(id=${emp.department.id})}"
                   class="btn btn-danger btn-sm mt-1">
                    Xóa phòng ban
                </a>
            </td>
        </tr>

        </tbody>
    </table>

    <!-- 📄 PAGING -->
    <nav th:if="${totalPages > 0}">
        <ul class="pagination">

            <!-- PREV -->
            <li class="page-item"
                th:classappend="${current == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/employees(
                        page=${current-1},
                        size=${pageSize},
                        name=${name},
                        departmentId=${departmentId},
                        minAge=${minAge},
                        maxAge=${maxAge}
                   )}">
                    Previous
                </a>
            </li>

            <!-- NUMBER -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:classappend="${i == current} ? 'active'">

                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/employees(
                        page=${i},
                        size=${pageSize},
                        name=${name},
                        departmentId=${departmentId},
                        minAge=${minAge},
                        maxAge=${maxAge}
                   )}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${current == totalPages-1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/employees(
                        page=${current+1},
                        size=${pageSize},
                        name=${name},
                        departmentId=${departmentId},
                        minAge=${minAge},
                        maxAge=${maxAge}
                   )}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
