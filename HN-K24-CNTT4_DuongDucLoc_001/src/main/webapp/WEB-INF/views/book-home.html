<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<style>
    .image{
        width: 70px;
        height: 70px;
    }
    .body-top{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
    }
</style>
<body>

<div class="card">
    <div class="card-header">
        Header
    </div>
    <!--tim kiem va them-->
    <div class="body-top">
        <div>
            <input placeholder="Search" >
            <button type="submit">
                <a href="">search</a>
            </button>
        </div>
        <div class="butomAdd">
            <button>
                <a th:href="@{/handle-view-add}">ADD</a>
            </button>
        </div>
    </div>
    <div>
        <table class="table">
            <thead>
            <tr>
                <th>STT</th>
                <th>Title</th>
                <th>Author</th>
                <th>Quantity</th>
                <th>Image</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${listBook}">
                <td th:text="${b.id}"></td>
                <td th:text="${b.title}"></td>
                <td th:text="${b.author}"></td>
                <td th:text="${b.quantity}"></td>
                <td>
                    <img th:src="@{${b.coverImage}}" alt="" class="image">
                </td>
                <td>
                    <a th:href="@{|/update/${b.id}|}">Sua</a>
                    <a th:href="@{|/delete/${b.id}|}" onclick="return confirm('Bạn có chắc chắn muốn xóa')">Xoa</a>
                </td>
            </tr>

            </tbody>
        </table>
    </div>
    <div class="card-footer text-muted">
        Footer
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
