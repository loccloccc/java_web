<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Shop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Sản phẩm</h2>

  <form method="get" th:action="@{/}" class="row g-2 mb-4">
    <div class="col-md-3">
      <input type="text" name="name" class="form-control" placeholder="Tên sản phẩm" th:value="${name}">
    </div>
    <div class="col-md-2">
      <input type="number" name="minPrice" class="form-control" placeholder="Giá từ" th:value="${minPrice}">
    </div>
    <div class="col-md-2">
      <input type="number" name="maxPrice" class="form-control" placeholder="Giá đến" th:value="${maxPrice}">
    </div>
    <div class="col-md-3">
      <select name="categoryId" class="form-select">
        <option value="">Tất cả danh mục</option>
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                th:selected="${cat.id == categoryId}"></option>
      </select>
    </div>
    <div class="col-md-2">
      <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
    </div>
  </form>

  <div class="row">
    <div class="col-md-3 mb-4" th:each="product : ${products}">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title" th:text="${product.name}"></h5>
          <p class="card-text" th:text="${product.price} + ' VNĐ'"></p>
          <form method="post" th:action="@{/cart/add/{id}(id=${product.id})}">
            <input type="number" name="quantity" value="1" min="1" class="form-control mb-2">
            <button type="submit" class="btn btn-success w-100">Thêm vào giỏ</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <nav th:if="${products.totalPages != 0}">
    <ul class="pagination">
      <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
        <a class="page-link" th:href="@{/(page=${i}, name=${name}, categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           th:text="${i + 1}"></a>
      </li>
    </ul>
  </nav>
</div>
</body>
</html>
