<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Giỏ hàng</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Giỏ hàng</h2>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <table class="table" th:if="${cart != null and !cart.isEmpty()}">
    <thead>
    <tr>
      <th>Sản phẩm</th>
      <th>Giá</th>
      <th>Số lượng</th>
      <th>Thành tiền</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${cart}">
      <td th:text="${item.productName}"></td>
      <td th:text="${item.price}"></td>
      <td th:text="${item.quantity}"></td>
      <td th:text="${item.price * item.quantity}"></td>
      <td>
        <form method="post" th:action="@{/cart/remove/{id}(id=${item.productId})}">
          <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <p th:if="${cart == null or cart.isEmpty()}">Giỏ hàng trống.</p>

  <a href="/checkout" class="btn btn-primary">Thanh toán</a>
  <a href="/" class="btn btn-secondary">Tiếp tục mua</a>
</div>
</body>
</html>
