<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Thanh toán</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Thanh toán</h2>

  <table class="table mb-4">
    <thead>
    <tr>
      <th>Sản phẩm</th>
      <th>Giá</th>
      <th>Số lượng</th>
      <th>Thành tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${cart}">
      <td th:text="${item.productName}"></td>
      <td th:text="${item.price}"></td>
      <td th:text="${item.quantity}"></td>
      <td th:text="${item.price * item.quantity}"></td>
    </tr>
    </tbody>
  </table>

  <form method="post" th:action="@{/checkout}" th:object="${order}">
    <div class="mb-3">
      <label>Họ tên</label>
      <input type="text" class="form-control" th:field="*{customerName}">
    </div>
    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" th:field="*{customerEmail}">
    </div>
    <div class="mb-3">
      <label>Số điện thoại</label>
      <input type="text" class="form-control" th:field="*{customerPhone}">
    </div>
    <div class="mb-3">
      <label>Địa chỉ giao hàng</label>
      <input type="text" class="form-control" th:field="*{shippingAddress}">
    </div>
    <button type="submit" class="btn btn-primary">Xác nhận đặt hàng</button>
    <a href="/cart" class="btn btn-secondary">Quay lại</a>
  </form>
</div>
</body>
</html>
