<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý danh mục</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Quản lý danh mục</h2>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <form method="post" th:action="@{/admin/categories/save}" th:object="${category}" class="row g-2 mb-4">
    <input type="hidden" th:field="*{id}">
    <div class="col-md-6">
      <input type="text" class="form-control" th:field="*{name}" placeholder="Tên danh mục">
    </div>
    <div class="col-md-2">
      <button type="submit" class="btn btn-primary w-100">Lưu</button>
    </div>
  </form>

  <table class="table">
    <thead>
    <tr>
      <th>ID</th>
      <th>Tên</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cat : ${categories}">
      <td th:text="${cat.id}"></td>
      <td th:text="${cat.name}"></td>
      <td>
        <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-warning btn-sm">Sửa</a>
        <form method="post" th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" style="display:inline">
          <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
