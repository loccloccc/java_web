<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý sản phẩm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h2>Quản lý sản phẩm</h2>

  <form method="post" th:action="@{/admin/products/save}" th:object="${product}" class="row g-2 mb-4">
    <input type="hidden" th:field="*{id}">
    <div class="col-md-3">
      <input type="text" class="form-control" th:field="*{name}" placeholder="Tên sản phẩm">
    </div>
    <div class="col-md-2">
      <input type="number" class="form-control" th:field="*{price}" placeholder="Giá">
    </div>
    <div class="col-md-2">
      <input type="number" class="form-control" th:field="*{stock}" placeholder="Tồn kho">
    </div>
    <div class="col-md-2">
      <select class="form-select" th:field="*{category.id}">
        <option value="">Danh mục</option>
        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="text" class="form-control" th:field="*{description}" placeholder="Mô tả">
    </div>
    <div class="col-md-2">
      <button type="submit" class="btn btn-primary w-100">Lưu</button>
    </div>
  </form>

  <table class="table">
    <thead>
    <tr>
      <th>ID</th>
      <th>Tên</th>
      <th>Giá</th>
      <th>Tồn kho</th>
      <th>Danh mục</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
      <td th:text="${p.id}"></td>
      <td th:text="${p.name}"></td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.stock}"></td>
      <td th:text="${p.category != null ? p.category.name : ''}"></td>
      <td>
        <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Sửa</a>
        <form method="post" th:action="@{/admin/products/delete/{id}(id=${p.id})}" style="display:inline">
          <button type="submit" class="btn btn-danger btn-sm">Xóa</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
